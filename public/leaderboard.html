<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Snake Mania</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Leaderboard</h1>
            <a href="index.html" class="back-btn">← Home</a>
        </header>
        <main>
            <div class="leaderboard-container">
                <h2>Top 10 Pemain Terbaik</h2>
                <div id="leaderboardList">
                    <!-- Scores will be loaded here -->
                </div>
                <a href="score.html" class="score-link">📊 Lihat Score Saya</a>
            </div>
        </main>
    </div>
    <script>
        // Demo leaderboard data (simulasi server)
        const demoLeaderboard = [
            {name: "ProPlayer", score: 1250, date: "2024-01-15"},
            {name: "SnakeMaster", score: 1180, date: "2024-01-14"},
            {name: "UlarNinja", score: 1095, date: "2024-01-13"},
            {name: "SpeedSnake", score: 980, date: "2024-01-12"},
            {name: "🐍King", score: 945, date: "2024-01-11"},
            {name: "Legend", score: 890, date: "2024-01-10"},
            {name: "GamerX", score: 825, date: "2024-01-09"},
            {name: "SnakePro", score: 780, date: "2024-01-08"},
            {name: "UlarGanas", score: 720, date: "2024-01-07"},
            {name: "Player1", score: 680, date: "2024-01-06"}
        ];

        function loadLeaderboard() {
            const container = document.getElementById('leaderboardList');
            demoLeaderboard.forEach((player, index) => {
                const playerEl = document.createElement('div');
                playerEl.className = `leaderboard-item rank-${index + 1}`;
                playerEl.innerHTML = `
                    <div class="rank">#${index + 1}</div>
                    <div class="player-info">
                        <span class="player-name">${player.name}</span>
                        <span class="player-score">${player.score}</span>
                    </div>
                    <small>${player.date}</small>
                `;
                container.appendChild(playerEl);
            });
        }
        loadLeaderboard();
    </script>
</body>
</html>
