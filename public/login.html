<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Snake Mania</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="container">
        <header>
            <h1>🐍 Snake Mania</h1>
            <a href="index.html" class="back-btn">← Kembali</a>
        </header>

        <main class="login-main">
            <div class="login-card">
                <h2>Masukkan Nama</h2>
                <form id="loginForm">
                    <input type="text" id="username" placeholder="Nama Player" maxlength="15" required>
                    <button type="submit">Masuk ke Game 🎮</button>
                </form>
                <p id="loginMessage"></p>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const message = document.getElementById('loginMessage');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            
            if (username) {
                localStorage.setItem('snakePlayer', username);
                window.location.href = 'game.html';
            } else {
                message.textContent = '❌ Nama tidak boleh kosong!';
                message.style.color = '#ff4444';
            }
        });

        // Auto focus
        usernameInput.focus();
    </script>
</body>
</html>
