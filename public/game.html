<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - Snake Mania</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
    <div class="game-container">
        <div class="game-header">
            <div class="player-info">
                <span id="playerName">-</span>
                <span>Score: <span id="score">0</span></span>
            </div>
            <div class="game-controls">
                <button id="pauseBtn">⏸️ Pause</button>
                <a href="index.html" class="back-btn">🏠 Home</a>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="game-info">
            <p>🐍 Gunakan Arrow Keys atau WASD untuk bergerak</p>
            <div class="speed-info">
                <span>Speed: <span id="speed">1</span></span>
            </div>
        </div>

        <div id="gameOver" class="game-over hidden">
            <h3>Game Over! 💀</h3>
            <p>Score Akhir: <span id="finalScore">0</span></p>
            <button id="playAgain">Main Lagi</button>
            <button id="saveScore">💾 Simpan Score</button>
        </div>
    </div>

    <script src="snake-game.js"></script>
</body>
</html>
