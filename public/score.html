<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score - Snake Mania</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Score Saya</h1>
            <a href="index.html" class="back-btn">← Kembali</a>
        </header>
        <main>
            <div class="score-card">
                <h2>🏆 Pencapaian Terbaik</h2>
                <div id="personalScores"></div>
            </div>
        </main>
    </div>
    <script>
        function loadPersonalScores() {
            const scores = JSON.parse(localStorage.getItem('snakeScores') || '[]');
            const container = document.getElementById('personalScores');
            
            if (scores.length === 0) {
                container.innerHTML = '<p>Belum ada score. Main game dulu! 🎮</p>';
                return;
            }
            
            scores.slice(0, 5).forEach((score, index) => {
                const scoreEl = document.createElement('div');
                scoreEl.className = 'score-item';
                scoreEl.innerHTML = `
                    <span>#${index + 1}</span>
                    <span>${score.name}: ${score.score}</span>
                    <small>${new Date(score.date).toLocaleDateString('id-ID')}</small>
                `;
                container.appendChild(scoreEl);
            });
        }
        loadPersonalScores();
    </script>
</body>
</html>
