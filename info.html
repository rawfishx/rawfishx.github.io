<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Info Test</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      color: #00ff99;
    }

    .box {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      overflow-wrap: break-word;
    }

    code {
      color: #00ffaa;
    }
  </style>
</head>
<body>

<h1>Browser Information Test</h1>
<p>Halaman ini menampilkan informasi yang bisa diakses website dari browser kamu.</p>

<div id="output"></div>

<script>
  const data = {
    userAgent: navigator.userAgent,
    platform: navigator.platform,
    language: navigator.language,
    languages: navigator.languages,
    cookieEnabled: navigator.cookieEnabled,
    online: navigator.onLine,
    hardwareConcurrency: navigator.hardwareConcurrency,
    deviceMemory: navigator.deviceMemory || "Tidak tersedia",
    screenWidth: screen.width,
    screenHeight: screen.height,
    colorDepth: screen.colorDepth,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    url: location.href,
    referrer: document.referrer || "Tidak ada",
    touchSupport: ('ontouchstart' in window),
    doNotTrack: navigator.doNotTrack,
  };

  const output = document.getElementById('output');

  for (const key in data) {
    const div = document.createElement('div');
    div.className = 'box';

    let value = data[key];

    if (typeof value === 'object') {
      value = JSON.stringify(value, null, 2);
    }

    div.innerHTML = `
      <b>${key}</b><br>
      <code>${value}</code>
    `;

    output.appendChild(div);
  }

  // Tes Canvas Fingerprint sederhana
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  ctx.textBaseline = 'top';
  ctx.font = '16px Arial';
  ctx.fillStyle = '#f60';
  ctx.fillRect(10, 10, 100, 40);
  ctx.fillStyle = '#069';
  ctx.fillText('Fingerprint Test', 15, 15);

  const fingerprint = canvas.toDataURL();

  const fpDiv = document.createElement('div');
  fpDiv.className = 'box';
  fpDiv.innerHTML = `
    <b>Canvas Fingerprint</b><br>
    <code>${fingerprint.substring(0, 120)}...</code>
  `;

  output.appendChild(fpDiv);

  // WebGL Renderer Test
  try {
    const glCanvas = document.createElement('canvas');
    const gl = glCanvas.getContext('webgl');

    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');

    const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
    const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);

    const glDiv = document.createElement('div');
    glDiv.className = 'box';
    glDiv.innerHTML = `
      <b>WebGL Info</b><br>
      <code>Vendor: ${vendor}<br>Renderer: ${renderer}</code>
    `;

    output.appendChild(glDiv);
  } catch (e) {
    console.log('WebGL tidak tersedia');
  }
</script>

</body>
</html>
