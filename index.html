<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UGC Settings Editor (Clean Version)</title>
<script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.5/dist/protobuf.min.js"></script>
<style>
body { font-family: sans-serif; background:#f4f4f4; padding:20px; }
.section { background:white; padding:15px; margin-bottom:15px; border-radius:8px; }
.setting { margin-bottom:10px; }
button { padding:10px 20px; }
</style>
</head>
<body>

<h2>UGC Settings Editor</h2>

<input type="file" id="fileInput">
<div id="settings"></div>
<button id="downloadBtn" style="display:none;">Save & Download</button>

<script>

const settingsMetadata = /* paste metadata kamu di sini */;

const protoSchema = `syntax="proto3";
message UGCProjectData{
bytes graph_editor_project=1;
bytes workflow_editor_project=2;
bytes entity_editor_project=3;
bytes hud_editor_project=4;
bytes map_editor_project=5;
Root ShahGCreator=6;
uint64 author_uid=7;
bytes custom_resources_package=8;
bytes timeline_editor_project=9;
bytes user_custom_event_editor_project=10;
int32 compatible_version=999;
int32 public_version=1000;
}
message Root{
repeated SettingsWrapper settings=1;
int32 version=3;
}
message SettingsWrapper{
repeated Settings settings=1;
}
message Settings{
int32 id=1;
bool enable=2;
int32 value=3;
float ratio=4;
}`;

let UGCProjectDataType;
let originalMessage = null;
let originalFileName = "";

const root = protobuf.parse(protoSchema).root;
UGCProjectDataType = root.lookupType("UGCProjectData");

document.getElementById("fileInput").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    originalFileName = file.name;

    const reader = new FileReader();
    reader.onload = ev => {
        try {
            originalMessage = UGCProjectDataType.decode(new Uint8Array(ev.target.result));
            renderSettings();
            document.getElementById("downloadBtn").style.display = "block";
        } catch(err){
            alert("Decode error: " + err.message);
        }
    };
    reader.readAsArrayBuffer(file);
});

function renderSettings(){
    const container = document.getElementById("settings");
    container.innerHTML = "";

    if (!originalMessage.ShahGCreator.settings.length) {
        originalMessage.ShahGCreator.settings.push({ settings: [] });
    }

    const fileSettings = originalMessage.ShahGCreator.settings[0].settings;

    settingsMetadata.forEach(meta => {

        let data = fileSettings.find(s => s.id === meta.ID);
        if (!data) {
            data = { id: meta.ID, enable:false, value:0, ratio:0 };
            fileSettings.push(data);
        }

        const div = document.createElement("div");
        div.className = "section setting";

        if (meta.Type === "boolean") {
            div.innerHTML = `
                <label>
                    <input type="checkbox" id="field_${meta.ID}" ${data.enable ? "checked":""}>
                    ${meta.Name}
                </label>
            `;
        } else {
            const val = meta.Type === "float" ? data.ratio : data.value;
            div.innerHTML = `
                <label>${meta.Name}</label><br>
                <input type="number" id="field_${meta.ID}" value="${val}" step="${meta.Type==="float"?"0.01":"1"}">
            `;
        }

        container.appendChild(div);
    });
}

document.getElementById("downloadBtn").addEventListener("click", () => {

    const fileSettings = originalMessage.ShahGCreator.settings[0].settings;

    settingsMetadata.forEach(meta => {
        const el = document.getElementById(`field_${meta.ID}`);
        if (!el) return;

        const target = fileSettings.find(s => s.id === meta.ID);

        if (meta.Type === "boolean") {
            target.enable = el.checked;
        } else if (meta.Type === "float") {
            target.ratio = parseFloat(el.value);
        } else {
            target.value = parseInt(el.value);
        }
    });

    const buffer = UGCProjectDataType.encode(originalMessage).finish();
    const blob = new Blob([buffer], { type: "application/octet-stream" });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = originalFileName || "modified.bytes";
    a.click();
});

</script>
</body>
</html>
