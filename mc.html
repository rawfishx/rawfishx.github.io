
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Command Crafter & Toolbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --surface2: #222;
            --border: #333;
            --gold: #ffaa00;
            --gold-dim: #cc8800;
            --red: #ff4444;
            --aqua: #55ffff;
            --green: #55ff55;
            --text: #ccc;
            --text-bright: #eee;
            --pixel: 'Press Start 2P', monospace;
            --mono: 'JetBrains Mono', monospace;
            --radius: 8px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(ellipse at 20% 20%, rgba(255,170,0,0.03) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(85,255,255,0.03) 0%, transparent 50%);
        }
        .header {
            background: #111;
            border-bottom: 3px solid var(--gold-dim);
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header .logo {
            font-family: var(--pixel);
            font-size: 12px;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255,170,0,0.5);
            letter-spacing: 1px;
        }
        .tab-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            padding: 6px 12px;
            background: #111;
            border-bottom: 1px solid #222;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-dim) #111;
        }
        .tab-btn {
            padding: 8px 14px;
            font-family: var(--pixel);
            font-size: 8px;
            background: transparent;
            border: 2px solid transparent;
            color: #888;
            cursor: pointer;
            border-radius: var(--radius);
            transition: 0.2s;
            white-space: nowrap;
        }
        .tab-btn:hover {
            color: var(--gold);
            border-color: #444;
        }
        .tab-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255,170,0,0.4);
        }
        .main {
            display: flex;
            flex: 1;
            gap: 6px;
            padding: 6px;
            min-height: 0;
        }
        @media (max-width: 850px) {
            .main {
                flex-direction: column;
            }
        }
        .panel {
            flex: 1;
            background: rgba(20,20,20,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #2a2a2a;
            border-radius: var(--radius);
            padding: 14px;
            overflow-y: auto;
            max-height: calc(100vh - 130px);
            scrollbar-width: thin;
            scrollbar-color: #444 #1a1a1a;
        }
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: calc(100vh - 130px);
        }
        .output-box {
            background: #0a0a0a;
            border: 2px solid #333;
            border-radius: var(--radius);
            padding: 12px;
            font-family: var(--mono);
            font-size: 11px;
            color: #aaffaa;
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: #555 #0a0a0a;
        }
        .copy-btn {
            position: sticky;
            top: 0;
            float: right;
            padding: 5px 12px;
            font-family: var(--pixel);
            font-size: 8px;
            background: var(--gold-dim);
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            z-index: 5;
        }
        .copy-btn:hover {
            background: var(--gold);
            box-shadow: 0 0 12px rgba(255,170,0,0.6);
        }
        .section-title {
            font-family: var(--pixel);
            font-size: 10px;
            color: var(--gold);
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #333;
            text-shadow: 0 0 8px rgba(255,170,0,0.4);
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-group label {
            display: block;
            font-size: 10px;
            color: #aaa;
            margin-bottom: 4px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: #1a1a1a;
            border: 2px solid #333;
            color: #eee;
            padding: 8px 10px;
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 11px;
            transition: 0.2s;
            resize: vertical;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 8px rgba(255,170,0,0.3);
        }
        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .row>* {
            flex: 1;
            min-width: 80px;
        }
        .btn {
            padding: 10px 18px;
            font-family: var(--pixel);
            font-size: 10px;
            background: var(--gold-dim);
            border: none;
            color: #000;
            border-radius: var(--radius);
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: var(--gold);
            box-shadow: 0 0 20px rgba(255,170,0,0.6);
            transform: translateY(-1px);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 8px;
            background: #222;
            border: 2px solid #444;
            color: #ccc;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: var(--pixel);
            transition: 0.2s;
        }
        .btn-sm:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        .result-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #1a1a1a;
            border: 1px solid var(--gold-dim);
            color: var(--gold);
            border-radius: 4px;
            font-size: 10px;
            margin: 4px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--gold-dim);
            color: #000;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-family: var(--pixel);
            font-size: 9px;
            z-index: 999;
            animation: slideUp 0.3s ease, fadeOut 0.3s ease 1.5s forwards;
        }
        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }
        .search-box {
            width: 100%;
            margin-bottom: 10px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
        .grid-3 button {
            padding: 6px;
            font-size: 9px;
            font-family: var(--mono);
            background: #1a1a1a;
            border: 1px solid #333;
            color: #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        .grid-3 button:hover {
            background: #2a2a2a;
            border-color: var(--gold);
            color: var(--gold);
        }
        input[type="range"] {
            accent-color: var(--gold);
        }
        .sim-result {
            background: #111;
            padding: 8px;
            border-radius: 4px;
            font-size: 10px;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo">⛏ MC COMMAND CRAFTER & TOOLBOX</span>
        <button class="btn-sm" onclick="saveFavorites()">⭐ Simpan Favorit</button>
        <button class="btn-sm" onclick="loadFavorites()">📂 Buka Favorit</button>
        <button class="btn-sm" onclick="exportCommands()">📤 Export .txt</button>
    </div>
    <div class="tab-bar" id="tabBar">
        <button class="tab-btn active" data-tab="give">/give Generator</button>
        <button class="tab-btn" data-tab="summon">/summon Generator</button>
        <button class="tab-btn" data-tab="effect">/effect Generator</button>
        <button class="tab-btn" data-tab="enchant">Enchant Calc</button>
        <button class="tab-btn" data-tab="potion">Potion Database</button>
        <button class="tab-btn" data-tab="coord">Coordinate Tools</button>
        <button class="tab-btn" data-tab="redstone">Redstone Calc</button>
        <button class="tab-btn" data-tab="lootsim">Loot Simulator</button>
        <button class="tab-btn" data-tab="blockdb">Block/Item DB</button>
        <button class="tab-btn" data-tab="recipe">Recipe Visualizer</button>
        <button class="tab-btn" data-tab="favorites">⭐ Favorit</button>
    </div>
    <div class="main">
        <div class="panel" id="editorPanel"></div>
        <div class="output-panel">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="section-title" style="margin:0;">📋 OUTPUT</span>
                <button class="copy-btn" onclick="copyOutput()">📋 Copy</button>
            </div>
            <div class="output-box" id="outputBox">// Command akan muncul di sini</div>
        </div>
    </div>
    <div id="toastContainer"></div>

    <script>
        (function() {
            const state = {
                activeTab: 'give',
                favorites: [],
                // /give
                give: {
                    player: '@p',
                    item: 'diamond_sword',
                    amount: 1,
                    data: 0,
                    name: '',
                    lore: '',
                    enchantments: [],
                    unbreakable: false,
                    keepOnDeath: false,
                    attributes: [],
                },
                // /summon
                summon: {
                    entity: 'zombie',
                    pos: '~ ~ ~',
                    customName: '',
                    health: 20,
                    equipment: { mainhand: '', offhand: '', head: '', chest: '', legs: '', feet: '' },
                    effects: [],
                    silent: false,
                    noAI: false,
                    baby: false,
                },
                // /effect
                effect: {
                    target: '@p',
                    effectId: 'speed',
                    duration: 30,
                    amplifier: 0,
                    hideParticles: false,
                },
                // enchant calc
                enchantCalc: {
                    item: 'sword',
                    enchants: {},
                    mode: 'table',
                },
                // potion db
                potionFilter: '',
                // coord tools
                coord: {
                    overworld: { x: 0, z: 0 },
                    nether: { x: 0, z: 0 },
                    point1: { x: 0, y: 64, z: 0 },
                    point2: { x: 100, y: 64, z: 100 },
                },
                // redstone
                redstone: {
                    comparatorInput: 0,
                    tickDelay: 0,
                },
                // loot sim
                lootSim: {
                    table: [
                        { item: 'diamond', weight: 1, min: 1, max: 1 },
                        { item: 'gold_ingot', weight: 5, min: 1, max: 3 },
                        { item: 'iron_ingot', weight: 10, min: 1, max: 5 },
                    ],
                    lastResult: [],
                },
                // block db
                blockFilter: '',
                // recipe viz
                recipeViz: {
                    grid: Array(9).fill(''),
                    result: 'diamond',
                },
            };

            const EFFECTS = [
                'speed', 'slowness', 'haste', 'mining_fatigue', 'strength', 'instant_health', 'instant_damage',
                'jump_boost', 'nausea', 'regeneration', 'resistance', 'fire_resistance', 'water_breathing',
                'invisibility', 'blindness', 'night_vision', 'hunger', 'weakness', 'poison', 'wither',
                'health_boost', 'absorption', 'saturation', 'levitation', 'slow_falling', 'conduit_power',
                'bad_omen', 'hero_of_the_village', 'darkness'
            ];
            const ENCHANTMENTS = {
                sword: ['sharpness', 'smite', 'bane_of_arthropods', 'knockback', 'fire_aspect', 'looting',
                    'unbreaking', 'mending'
                ],
                tool: ['efficiency', 'fortune', 'silk_touch', 'unbreaking', 'mending'],
                armor: ['protection', 'fire_protection', 'blast_protection', 'projectile_protection', 'thorns',
                    'unbreaking', 'mending'
                ],
                bow: ['power', 'punch', 'flame', 'infinity', 'unbreaking', 'mending'],
                trident: ['loyalty', 'impaling', 'riptide', 'channeling', 'unbreaking', 'mending'],
                crossbow: ['quick_charge', 'multishot', 'piercing', 'unbreaking', 'mending'],
            };
            const BLOCK_DB = [
                'stone', 'dirt', 'grass', 'cobblestone', 'oak_planks', 'bedrock', 'sand', 'gravel', 'gold_ore',
                'iron_ore', 'coal_ore', 'diamond_ore', 'redstone_ore', 'emerald_ore', 'lapis_ore',
                'obsidian', 'glowstone', 'netherrack', 'soul_sand', 'end_stone', 'purpur_block',
                'crafting_table', 'furnace', 'chest', 'enchanting_table', 'anvil', 'brewing_stand',
                'oak_log', 'spruce_log', 'birch_log', 'jungle_log', 'acacia_log', 'dark_oak_log',
                'glass', 'white_wool', 'bricks', 'stone_bricks', 'mossy_cobblestone', 'ice', 'packed_ice',
                'blue_ice', 'magma_block', 'sponge', 'wet_sponge', 'prismarine', 'sea_lantern',
                'terracotta', 'white_terracotta', 'concrete', 'white_concrete', 'black_concrete',
                'diamond_block', 'gold_block', 'iron_block', 'emerald_block', 'redstone_block', 'lapis_block',
                'coal_block', 'netherite_block', 'ancient_debris', 'crying_obsidian', 'blackstone',
                'gilded_blackstone', 'basalt', 'polished_basalt', 'shroomlight', 'crimson_stem', 'warped_stem'
            ];
            const ITEM_DB = [
                'diamond_sword', 'iron_sword', 'stone_sword', 'wooden_sword', 'golden_sword', 'netherite_sword',
                'diamond_pickaxe', 'iron_pickaxe', 'stone_pickaxe', 'wooden_pickaxe', 'golden_pickaxe',
                'netherite_pickaxe',
                'diamond_axe', 'iron_axe', 'stone_axe', 'wooden_axe', 'golden_axe', 'netherite_axe',
                'diamond_shovel', 'iron_shovel', 'stone_shovel', 'wooden_shovel', 'golden_shovel',
                'netherite_shovel',
                'diamond_hoe', 'iron_hoe', 'stone_hoe', 'wooden_hoe', 'golden_hoe', 'netherite_hoe',
                'bow', 'crossbow', 'trident', 'shield', 'fishing_rod', 'carrot_on_a_stick', 'warped_fungus_on_a_stick',
                'shears', 'flint_and_steel', 'compass', 'clock', 'lead', 'name_tag', 'saddle',
                'diamond_helmet', 'iron_helmet', 'chainmail_helmet', 'golden_helmet', 'netherite_helmet',
                'diamond_chestplate', 'iron_chestplate', 'chainmail_chestplate', 'golden_chestplate',
                'netherite_chestplate',
                'diamond_leggings', 'iron_leggings', 'chainmail_leggings', 'golden_leggings', 'netherite_leggings',
                'diamond_boots', 'iron_boots', 'chainmail_boots', 'golden_boots', 'netherite_boots',
                'apple', 'golden_apple', 'enchanted_golden_apple', 'cooked_beef', 'cooked_porkchop', 'bread',
                'cake', 'cookie', 'melon_slice', 'pumpkin_pie', 'carrot', 'potato', 'baked_potato',
                'ender_pearl', 'ender_eye', 'fire_charge', 'snowball', 'egg', 'experience_bottle',
                'potion', 'splash_potion', 'lingering_potion', 'arrow', 'spectral_arrow', 'tipped_arrow',
                'totem_of_undying', 'elytra', 'firework_rocket', 'map', 'filled_map', 'book', 'writable_book',
                'written_book', 'enchanted_book', 'spawn_egg', 'music_disc_13', 'music_disc_cat',
                'nether_star', 'dragon_egg', 'beacon', 'conduit', 'scaffolding', 'honey_bottle',
                'honeycomb', 'slime_ball', 'magma_cream', 'ghast_tear', 'blaze_rod', 'blaze_powder',
                'nether_wart', 'fermented_spider_eye', 'glistering_melon_slice', 'golden_carrot',
                'phantom_membrane', 'turtle_helmet', 'scute', 'nautilus_shell', 'heart_of_the_sea',
            ];

            function showToast(msg) {
                const t = document.getElementById('toastContainer');
                const el = document.createElement('div');
                el.className = 'toast';
                el.textContent = msg;
                t.appendChild(el);
                setTimeout(() => el.remove(), 2000);
            }

            function copyOutput() {
                const txt = document.getElementById('outputBox').textContent;
                navigator.clipboard.writeText(txt).then(() => showToast('Command disalin!'));
            }

            function saveFavorites() {
                const cmd = document.getElementById('outputBox').textContent.trim();
                if (!cmd || cmd.startsWith('//')) return showToast('Tidak ada command!');
                state.favorites.push({ cmd, time: new Date().toLocaleString() });
                localStorage.setItem('mc_favorites', JSON.stringify(state.favorites));
                showToast('Disimpan ke favorit!');
            }

            function loadFavorites() {
                const raw = localStorage.getItem('mc_favorites');
                if (raw) state.favorites = JSON.parse(raw);
                state.activeTab = 'favorites';
                refreshAll();
            }

            function exportCommands() {
                const cmds = state.favorites.map(f => f.cmd).join('\n');
                const blob = new Blob([cmds], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'mc_commands.txt';
                a.click();
                showToast('Commands diexport!');
            }

            function refreshAll() {
                renderEditor();
                updateOutput();
            }

            function renderEditor() {
                const panel = document.getElementById('editorPanel');
                panel.innerHTML = '';
                switch (state.activeTab) {
                    case 'give':
                        renderGive(panel);
                        break;
                    case 'summon':
                        renderSummon(panel);
                        break;
                    case 'effect':
                        renderEffect(panel);
                        break;
                    case 'enchant':
                        renderEnchant(panel);
                        break;
                    case 'potion':
                        renderPotion(panel);
                        break;
                    case 'coord':
                        renderCoord(panel);
                        break;
                    case 'redstone':
                        renderRedstone(panel);
                        break;
                    case 'lootsim':
                        renderLootSim(panel);
                        break;
                    case 'blockdb':
                        renderBlockDB(panel);
                        break;
                    case 'recipe':
                        renderRecipe(panel);
                        break;
                    case 'favorites':
                        renderFavorites(panel);
                        break;
                }
            }

            function renderGive(panel) {
                const g = state.give;
                panel.innerHTML = `
                <h3 class="section-title">🎁 /GIVE GENERATOR</h3>
                <div class="row">
                  <div class="form-group"><label>Player</label><input type="text" value="${g.player}" id="give_player"></div>
                  <div class="form-group"><label>Item</label><input type="text" value="${g.item}" id="give_item" list="itemList"><datalist id="itemList">${ITEM_DB.map(i=>`<option value="${i}">`).join('')}</datalist></div>
                  <div class="form-group"><label>Jumlah</label><input type="number" value="${g.amount}" id="give_amount" min="1" max="64"></div>
                </div>
                <div class="row">
                  <div class="form-group"><label>Custom Name</label><input type="text" value="${g.name}" id="give_name" placeholder="Opsional"></div>
                  <div class="form-group"><label>Lore (pisahkan dengan |)</label><input type="text" value="${g.lore}" id="give_lore" placeholder="Baris 1|Baris 2"></div>
                </div>
                <label><input type="checkbox" ${g.unbreakable?'checked':''} id="give_unbreakable"> Unbreakable</label>
                <label style="margin-left:10px;"><input type="checkbox" ${g.keepOnDeath?'checked':''} id="give_keep"> Keep on Death</label>
                <h4 style="color:var(--gold);margin-top:10px;">Enchantments</h4>
                <div id="giveEnchants"></div>
                <button class="btn-sm" onclick="addGiveEnchant()">+ Enchant</button>
                <button class="btn" style="margin-top:10px;" onclick="updateGiveFromForm();updateOutput();">Generate Command</button>`;
                renderGiveEnchants();
            }

            function renderGiveEnchants() {
                const container = document.getElementById('giveEnchants');
                if (!container) return;
                container.innerHTML = state.give.enchantments.map((e, i) => `
                <div class="row" style="align-items:center;margin-bottom:4px;">
                  <input type="text" value="${e.id}" placeholder="enchant" style="flex:2;" onchange="state.give.enchantments[${i}].id=this.value;updateOutput();">
                  <input type="number" value="${e.level}" placeholder="level" min="1" style="flex:1;" onchange="state.give.enchantments[${i}].level=parseInt(this.value)||1;updateOutput();">
                  <button class="btn-sm" style="color:#f44;border-color:#f44;" onclick="state.give.enchantments.splice(${i},1);renderGiveEnchants();updateOutput();">✕</button>
                </div>`).join('');
            }

            function addGiveEnchant() {
                state.give.enchantments.push({ id: 'sharpness', level: 1 });
                renderGiveEnchants();
                updateOutput();
            }

            function updateGiveFromForm() {
                state.give.player = document.getElementById('give_player').value;
                state.give.item = document.getElementById('give_item').value;
                state.give.amount = parseInt(document.getElementById('give_amount').value) || 1;
                state.give.name = document.getElementById('give_name').value;
                state.give.lore = document.getElementById('give_lore').value;
                state.give.unbreakable = document.getElementById('give_unbreakable').checked;
                state.give.keepOnDeath = document.getElementById('give_keep').checked;
            }

            function renderSummon(panel) {
                const s = state.summon;
                panel.innerHTML = `
                <h3 class="section-title">👾 /SUMMON GENERATOR</h3>
                <div class="row">
                  <div class="form-group"><label>Entity</label><input type="text" value="${s.entity}" id="summon_entity"></div>
                  <div class="form-group"><label>Posisi</label><input type="text" value="${s.pos}" id="summon_pos"></div>
                </div>
                <div class="form-group"><label>Custom Name</label><input type="text" value="${s.customName}" id="summon_name"></div>
                <div class="row">
                  <div class="form-group"><label>Health</label><input type="number" value="${s.health}" id="summon_hp"></div>
                </div>
                <label><input type="checkbox" ${s.silent?'checked':''} id="summon_silent"> Silent</label>
                <label style="margin-left:10px;"><input type="checkbox" ${s.noAI?'checked':''} id="summon_noai"> No AI</label>
                <label style="margin-left:10px;"><input type="checkbox" ${s.baby?'checked':''} id="summon_baby"> Baby</label>
                <h4 style="color:var(--gold);margin-top:10px;">Equipment</h4>
                <div class="row">
                  ${['mainhand','offhand','head','chest','legs','feet'].map(slot=>`
                    <div class="form-group"><label>${slot}</label><input type="text" value="${s.equipment[slot]}" id="summon_eq_${slot}" placeholder="item id"></div>
                  `).join('')}
                </div>
                <button class="btn" onclick="updateSummonFromForm();updateOutput();">Generate Command</button>`;
            }

            function updateSummonFromForm() {
                const s = state.summon;
                s.entity = document.getElementById('summon_entity').value;
                s.pos = document.getElementById('summon_pos').value;
                s.customName = document.getElementById('summon_name').value;
                s.health = parseInt(document.getElementById('summon_hp').value) || 20;
                s.silent = document.getElementById('summon_silent').checked;
                s.noAI = document.getElementById('summon_noai').checked;
                s.baby = document.getElementById('summon_baby').checked;
                ['mainhand', 'offhand', 'head', 'chest', 'legs', 'feet'].forEach(slot => {
                    s.equipment[slot] = document.getElementById('summon_eq_' + slot).value;
                });
            }

            function renderEffect(panel) {
                const e = state.effect;
                panel.innerHTML = `
                <h3 class="section-title">✨ /EFFECT GENERATOR</h3>
                <div class="row">
                  <div class="form-group"><label>Target</label><input type="text" value="${e.target}" id="eff_target"></div>
                  <div class="form-group"><label>Effect</label><select id="eff_id">${EFFECTS.map(ef=>`<option ${e.effectId===ef?'selected':''}>${ef}</option>`).join('')}</select></div>
                </div>
                <div class="row">
                  <div class="form-group"><label>Duration (detik)</label><input type="number" value="${e.duration}" id="eff_dur"></div>
                  <div class="form-group"><label>Amplifier (0 = level 1)</label><input type="number" value="${e.amplifier}" id="eff_amp" min="0" max="255"></div>
                </div>
                <label><input type="checkbox" ${e.hideParticles?'checked':''} id="eff_hide"> Hide Particles</label>
                <button class="btn" onclick="updateEffectFromForm();updateOutput();" style="margin-top:10px;">Generate Command</button>`;
            }

            function updateEffectFromForm() {
                state.effect.target = document.getElementById('eff_target').value;
                state.effect.effectId = document.getElementById('eff_id').value;
                state.effect.duration = parseInt(document.getElementById('eff_dur').value) || 30;
                state.effect.amplifier = parseInt(document.getElementById('eff_amp').value) || 0;
                state.effect.hideParticles = document.getElementById('eff_hide').checked;
            }

            function renderEnchant(panel) {
                const ec = state.enchantCalc;
                panel.innerHTML = `
                <h3 class="section-title">📚 ENCHANT CALCULATOR</h3>
                <div class="form-group"><label>Jenis Item</label><select id="ench_item" onchange="state.enchantCalc.item=this.value;renderEnchant(document.getElementById('editorPanel'));">${Object.keys(ENCHANTMENTS).map(k=>`<option ${ec.item===k?'selected':''}>${k}</option>`).join('')}</select></div>
                <h4 style="color:var(--gold);">Enchantments</h4>
                <div id="enchList"></div>
                <button class="btn-sm" onclick="addEnchantToCalc()">+ Tambah</button>
                <div class="sim-result" id="enchResult"></div>`;
                renderEnchList();
            }

            function renderEnchList() {
                const container = document.getElementById('enchList');
                if (!container) return;
                const avail = ENCHANTMENTS[state.enchantCalc.item] || [];
                container.innerHTML = Object.entries(state.enchantCalc.enchants).map(([id, lvl], i) => `
                <div class="row" style="align-items:center;margin-bottom:4px;">
                  <select style="flex:2;" onchange="const newId=this.value; delete state.enchantCalc.enchants['${id}']; state.enchantCalc.enchants[newId]=${lvl}; renderEnchList();updateEnchantCalc();">${avail.map(e=>`<option ${e===id?'selected':''}>${e}</option>`).join('')}</select>
                  <input type="number" value="${lvl}" min="1" max="5" style="flex:1;" onchange="state.enchantCalc.enchants['${id}']=parseInt(this.value)||1;updateEnchantCalc();">
                  <button class="btn-sm" style="color:#f44;border-color:#f44;" onclick="delete state.enchantCalc.enchants['${id}']; renderEnchList();updateEnchantCalc();">✕</button>
                </div>`).join('');
                if (Object.keys(state.enchantCalc.enchants).length === 0) container.innerHTML =
                    '<p style="color:#666;">Belum ada enchantment</p>';
            }

            function addEnchantToCalc() {
                const avail = ENCHANTMENTS[state.enchantCalc.item] || [];
                if (avail.length === 0) return;
                const id = avail[0];
                state.enchantCalc.enchants[id] = 1;
                renderEnchList();
                updateEnchantCalc();
            }

            function updateEnchantCalc() {
                const res = document.getElementById('enchResult');
                if (!res) return;
                const total = Object.values(state.enchantCalc.enchants).reduce((a, b) => a + b, 0);
                res.innerHTML = `<b>Total level:</b> ${total} | <b>Biaya XP (estimasi):</b> ${total*2} level`;
            }

            function renderPotion(panel) {
                panel.innerHTML = `
                <h3 class="section-title">🧪 POTION DATABASE</h3>
                <input type="text" class="search-box" placeholder="Cari potion/effect..." oninput="state.potionFilter=this.value;renderPotion(document.getElementById('editorPanel'));">
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;" id="potionGrid"></div>`;
                const grid = document.getElementById('potionGrid');
                const recipes = {
                    'Awkward': 'Nether Wart + Water Bottle',
                    'Swiftness': 'Sugar + Awkward',
                    'Slowness': 'Fermented Spider Eye + Swiftness',
                    'Strength': 'Blaze Powder + Awkward',
                    'Healing': 'Glistering Melon + Awkward',
                    'Harming': 'Fermented Spider Eye + Healing',
                    'Poison': 'Spider Eye + Awkward',
                    'Regeneration': 'Ghast Tear + Awkward',
                    'Fire Resistance': 'Magma Cream + Awkward',
                    'Water Breathing': 'Pufferfish + Awkward',
                    'Invisibility': 'Fermented Spider Eye + Night Vision',
                    'Night Vision': 'Golden Carrot + Awkward',
                    'Leaping': 'Rabbit Foot + Awkward',
                    'Slow Falling': 'Phantom Membrane + Awkward',
                    'Turtle Master': 'Turtle Shell + Awkward',
                };
                Object.entries(recipes).filter(([k]) => k.toLowerCase().includes(state.potionFilter.toLowerCase())).forEach(
                    ([name, recipe]) => {
                        const div = document.createElement('div');
                        div.style.padding = '8px';
                        div.style.background = '#1a1a1a';
                        div.style.borderRadius = '6px';
                        div.style.fontSize = '10px';
                        div.innerHTML = `<b style="color:var(--aqua);">${name}</b><br><span style="color:#aaa;">${recipe}</span>`;
                        grid.appendChild(div);
                    });
            }

            function renderCoord(panel) {
                const c = state.coord;
                panel.innerHTML = `
                <h3 class="section-title">📍 COORDINATE TOOLS</h3>
                <h4 style="color:var(--gold);">Nether ↔ Overworld</h4>
                <div class="row">
                  <div class="form-group"><label>Overworld X</label><input type="number" value="${c.overworld.x}" id="ow_x"></div>
                  <div class="form-group"><label>Overworld Z</label><input type="number" value="${c.overworld.z}" id="ow_z"></div>
                </div>
                <button class="btn-sm" onclick="convertOWtoNether()">⬇ Ke Nether</button>
                <div class="row" style="margin-top:8px;">
                  <div class="form-group"><label>Nether X</label><input type="number" value="${c.nether.x}" id="n_x"></div>
                  <div class="form-group"><label>Nether Z</label><input type="number" value="${c.nether.z}" id="n_z"></div>
                </div>
                <button class="btn-sm" onclick="convertNetherToOW()">⬆ Ke Overworld</button>
                <h4 style="color:var(--gold);margin-top:14px;">Jarak 3D</h4>
                <div class="row">
                  <div class="form-group"><label>Titik 1 (x y z)</label><input type="text" value="${c.point1.x},${c.point1.y},${c.point1.z}" id="p1"></div>
                  <div class="form-group"><label>Titik 2 (x y z)</label><input type="text" value="${c.point2.x},${c.point2.y},${c.point2.z}" id="p2"></div>
                </div>
                <button class="btn-sm" onclick="calcDistance()">Hitung Jarak</button>
                <div class="sim-result" id="coordResult"></div>`;
            }

            function convertOWtoNether() {
                const x = parseInt(document.getElementById('ow_x').value) || 0;
                const z = parseInt(document.getElementById('ow_z').value) || 0;
                document.getElementById('n_x').value = Math.floor(x / 8);
                document.getElementById('n_z').value = Math.floor(z / 8);
                updateCoordFromForm();
            }

            function convertNetherToOW() {
                const x = parseInt(document.getElementById('n_x').value) || 0;
                const z = parseInt(document.getElementById('n_z').value) || 0;
                document.getElementById('ow_x').value = x * 8;
                document.getElementById('ow_z').value = z * 8;
                updateCoordFromForm();
            }

            function calcDistance() {
                const p1 = document.getElementById('p1').value.split(',').map(Number);
                const p2 = document.getElementById('p2').value.split(',').map(Number);
                const dist = Math.sqrt((p2[0] - p1[0]) ** 2 + (p2[1] - p1[1]) ** 2 + (p2[2] - p1[2]) ** 2).toFixed(2);
                document.getElementById('coordResult').innerHTML = `<b>Jarak:</b> ${dist} block`;
            }

            function updateCoordFromForm() {
                const c = state.coord;
                c.overworld.x = parseInt(document.getElementById('ow_x').value) || 0;
                c.overworld.z = parseInt(document.getElementById('ow_z').value) || 0;
                c.nether.x = parseInt(document.getElementById('n_x').value) || 0;
                c.nether.z = parseInt(document.getElementById('n_z').value) || 0;
            }

            function renderRedstone(panel) {
                panel.innerHTML = `
                <h3 class="section-title">⚡ REDSTONE CALCULATOR</h3>
                <div class="form-group"><label>Comparator Input Strength</label><input type="range" min="0" max="15" value="${state.redstone.comparatorInput}" oninput="state.redstone.comparatorInput=parseInt(this.value);document.getElementById('compOut').textContent=this.value;updateRedstoneOutput();"><span id="compOut">${state.redstone.comparatorInput}</span></div>
                <div class="form-group"><label>Tick Delay (detik)</label><input type="number" step="0.1" value="${state.redstone.tickDelay}" onchange="state.redstone.tickDelay=parseFloat(this.value)||0;updateRedstoneOutput();"></div>
                <div class="sim-result" id="redstoneResult"></div>`;
                updateRedstoneOutput();
            }

            function updateRedstoneOutput() {
                const res = document.getElementById('redstoneResult');
                if (!res) return;
                const ticks = Math.round(state.redstone.tickDelay * 20);
                res.innerHTML =
                    `<b>Comparator output:</b> ${state.redstone.comparatorInput} | <b>Delay:</b> ${ticks} redstone ticks (${state.redstone.tickDelay}s) | <b>Repeater:</b> ${Math.ceil(ticks/2)} repeater(s)`;
            }

            function renderLootSim(panel) {
                panel.innerHTML = `
                <h3 class="section-title">🎲 LOOT SIMULATOR</h3>
                <div id="lootEntries"></div>
                <button class="btn-sm" onclick="addLootEntry()">+ Tambah Item</button>
                <button class="btn" onclick="simulateLoot()" style="margin-top:8px;">🎰 Simulate Drop</button>
                <div class="sim-result" id="lootResult">Klik simulate untuk melihat hasil random</div>`;
                renderLootEntries();
            }

            function renderLootEntries() {
                const container = document.getElementById('lootEntries');
                if (!container) return;
                container.innerHTML = state.lootSim.table.map((e, i) => `
                <div class="row" style="align-items:center;margin-bottom:4px;">
                  <input type="text" value="${e.item}" placeholder="item" style="flex:2;" onchange="state.lootSim.table[${i}].item=this.value;">
                  <input type="number" value="${e.weight}" placeholder="weight" min="1" style="flex:1;" onchange="state.lootSim.table[${i}].weight=parseInt(this.value)||1;">
                  <input type="number" value="${e.min}" placeholder="min" min="1" style="flex:1;" onchange="state.lootSim.table[${i}].min=parseInt(this.value)||1;">
                  <input type="number" value="${e.max}" placeholder="max" min="1" style="flex:1;" onchange="state.lootSim.table[${i}].max=parseInt(this.value)||1;">
                  <button class="btn-sm" style="color:#f44;border-color:#f44;" onclick="state.lootSim.table.splice(${i},1);renderLootEntries();">✕</button>
                </div>`).join('');
            }

            function addLootEntry() {
                state.lootSim.table.push({ item: 'bone', weight: 1, min: 1, max: 1 });
                renderLootEntries();
            }

            function simulateLoot() {
                const totalWeight = state.lootSim.table.reduce((s, e) => s + e.weight, 0);
                let rand = Math.random() * totalWeight;
                let chosen = state.lootSim.table[0];
                for (const entry of state.lootSim.table) {
                    rand -= entry.weight;
                    if (rand <= 0) { chosen = entry; break; }
                }
                const count = Math.floor(Math.random() * (chosen.max - chosen.min + 1)) + chosen.min;
                document.getElementById('lootResult').innerHTML =
                    `<b>🎁 Kamu mendapat:</b> ${count}x ${chosen.item} (weight: ${chosen.weight}/${totalWeight})`;
            }

            function renderBlockDB(panel) {
                panel.innerHTML = `
                <h3 class="section-title">📦 BLOCK & ITEM DATABASE</h3>
                <input type="text" class="search-box" placeholder="Cari block atau item..." oninput="state.blockFilter=this.value;renderBlockDB(document.getElementById('editorPanel'));">
                <div class="grid-3" id="dbGrid"></div>`;
                const grid = document.getElementById('dbGrid');
                const all = [...BLOCK_DB, ...ITEM_DB];
                all.filter(i => i.toLowerCase().includes(state.blockFilter.toLowerCase())).forEach(item => {
                    const btn = document.createElement('button');
                    btn.textContent = item;
                    btn.onclick = () => {
                        document.getElementById('outputBox').textContent = item;
                        showToast('ID disalin ke output');
                    };
                    grid.appendChild(btn);
                });
            }

            function renderRecipe(panel) {
                panel.innerHTML = `
                <h3 class="section-title">🔧 RECIPE VISUALIZER</h3>
                <div style="display:grid;grid-template-columns:repeat(3,60px);gap:4px;margin-bottom:10px;" id="recipeGrid"></div>
                <div class="form-group"><label>Hasil</label><input type="text" value="${state.recipeViz.result}" id="recipeResult"></div>
                <button class="btn-sm" onclick="generateRecipeCommand()">Buat /give Command</button>`;
                const grid = document.getElementById('recipeGrid');
                for (let i = 0; i < 9; i++) {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = state.recipeViz.grid[i];
                    input.style.width = '60px';
                    input.style.textAlign = 'center';
                    input.style.fontSize = '9px';
                    input.onchange = function() { state.recipeViz.grid[i] = this.value; };
                    grid.appendChild(input);
                }
            }

            function generateRecipeCommand() {
                const result = document.getElementById('recipeResult').value;
                const cmd = `/give @p ${result} 1 0 {display:{Name:"{\\"text\\":\\"${result}\\"}"}}`;
                document.getElementById('outputBox').textContent = cmd;
                showToast('Command digenerate!');
            }

            function renderFavorites(panel) {
                panel.innerHTML = `
                <h3 class="section-title">⭐ COMMAND FAVORIT</h3>
                ${state.favorites.length===0?'<p style="color:#666;">Belum ada favorit. Gunakan tombol ⭐ Simpan Favorit di output.</p>':''}
                ${state.favorites.map((f,i)=>`
                  <div style="background:#1a1a1a;padding:8px;margin-bottom:6px;border-radius:4px;font-size:10px;display:flex;justify-content:space-between;align-items:center;">
                    <span style="color:#aaffaa;flex:1;word-break:break-all;">${f.cmd}</span>
                    <div>
                      <button class="btn-sm" onclick="document.getElementById('outputBox').textContent='${f.cmd.replace(/'/g,"\\'")}';showToast('Dimuat ke output')">📋</button>
                      <button class="btn-sm" style="color:#f44;border-color:#f44;" onclick="state.favorites.splice(${i},1);localStorage.setItem('mc_favorites',JSON.stringify(state.favorites));renderFavorites(document.getElementById('editorPanel'));">✕</button>
                    </div>
                  </div>
                `).join('')}`;
            }

            function generateGiveCommand() {
                const g = state.give;
                let cmd = `/give ${g.player} ${g.item} ${g.amount} ${g.data || 0}`;
                const tags = [];
                if (g.name) tags.push(`display:{Name:'{"text":"${g.name}"}'`);
                if (g.lore) {
                    const loreArr = g.lore.split('|').map(l => `"${l.trim()}"`).join(',');
                    tags.push(`Lore:[${loreArr}]`);
                }
                if (g.enchantments.length > 0) {
                    const enchArr = g.enchantments.map(e => `{id:"${e.id}",lvl:${e.level}}`).join(',');
                    tags.push(`Enchantments:[${enchArr}]`);
                }
                if (g.unbreakable) tags.push('Unbreakable:1');
                if (g.keepOnDeath) tags.push('KeepOnDeath:1');
                if (tags.length > 0) cmd += ` {${tags.join(',')}}`;
                return cmd;
            }

            function generateSummonCommand() {
                const s = state.summon;
                let cmd = `/summon ${s.entity} ${s.pos}`;
                const tags = [];
                if (s.customName) tags.push(`CustomName:"${s.customName}"`);
                if (s.health !== 20) tags.push(`Health:${s.health}`);
                if (s.silent) tags.push('Silent:1');
                if (s.noAI) tags.push('NoAI:1');
                if (s.baby) tags.push('IsBaby:1');
                const eq = [];
                ['mainhand', 'offhand', 'head', 'chest', 'legs', 'feet'].forEach(slot => {
                    if (s.equipment[slot]) eq.push(`{Slot:${['mainhand','offhand','head','chest','legs','feet'].indexOf(slot)},id:"${s.equipment[slot]}"}`);
                });
                if (eq.length > 0) tags.push(`ArmorItems:[${eq.join(',')}]`);
                if (tags.length > 0) cmd += ` {${tags.join(',')}}`;
                return cmd;
            }

            function generateEffectCommand() {
                const e = state.effect;
                return `/effect ${e.target} ${e.effectId} ${e.duration} ${e.amplifier} ${e.hideParticles?'true':'false'}`;
            }

            function updateOutput() {
                let cmd = '';
                switch (state.activeTab) {
                    case 'give':
                        updateGiveFromForm();
                        cmd = generateGiveCommand();
                        break;
                    case 'summon':
                        updateSummonFromForm();
                        cmd = generateSummonCommand();
                        break;
                    case 'effect':
                        updateEffectFromForm();
                        cmd = generateEffectCommand();
                        break;
                    case 'enchant':
                        cmd = `/enchant @p ${Object.entries(state.enchantCalc.enchants).map(([id,lvl])=>`${id} ${lvl}`).join(' ')}`;
                        break;
                    case 'coord':
                        updateCoordFromForm();
                        cmd =
                            `Nether: ${state.coord.nether.x}, ~, ${state.coord.nether.z}\nOverworld: ${state.coord.overworld.x}, ~, ${state.coord.overworld.z}`;
                        break;
                    case 'redstone':
                        cmd =
                            `Comparator: ${state.redstone.comparatorInput}\nTicks: ${Math.round(state.redstone.tickDelay*20)}`;
                        break;
                    case 'lootsim':
                        cmd = '// Klik Simulate untuk hasil random';
                        break;
                    default:
                        cmd = '// Command akan muncul di sini';
                }
                document.getElementById('outputBox').textContent = cmd;
            }

            document.getElementById('tabBar').addEventListener('click', function(e) {
                if (e.target.classList.contains('tab-btn')) {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    state.activeTab = e.target.dataset.tab;
                    refreshAll();
                }
            });

            // Init
            const savedFav = localStorage.getItem('mc_favorites');
            if (savedFav) state.favorites = JSON.parse(savedFav);
            renderEditor();
            updateOutput();

            // Expose functions
            window.addGiveEnchant = addGiveEnchant;
            window.updateGiveFromForm = updateGiveFromForm;
            window.updateSummonFromForm = updateSummonFromForm;
            window.updateEffectFromForm = updateEffectFromForm;
            window.addEnchantToCalc = addEnchantToCalc;
            window.updateEnchantCalc = updateEnchantCalc;
            window.convertOWtoNether = convertOWtoNether;
            window.convertNetherToOW = convertNetherToOW;
            window.calcDistance = calcDistance;
            window.updateCoordFromForm = updateCoordFromForm;
            window.updateRedstoneOutput = updateRedstoneOutput;
            window.addLootEntry = addLootEntry;
            window.simulateLoot = simulateLoot;
            window.generateRecipeCommand = generateRecipeCommand;
            window.updateOutput = updateOutput;
            window.saveFavorites = saveFavorites;
            window.loadFavorites = loadFavorites;
            window.exportCommands = exportCommands;
            window.copyOutput = copyOutput;
            window.renderEnchList = renderEnchList;
            window.renderLootEntries = renderLootEntries;
            window.refreshAll = refreshAll;
        })();
    </script>
</body>
</html>
