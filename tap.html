<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multiplayer Chat + Canvas</title>

<style>
body { font-family: Arial; background:#111; color:white; margin:0; }
#chat { height:200px; overflow:auto; border:1px solid #333; padding:10px; }
.msg { margin:5px 0; padding:5px; background:#222; border-radius:5px; }

#canvas {
  border:1px solid #555;
  background:white;
  display:block;
  margin-top:10px;
}

.toolbar {
  display:flex;
  gap:10px;
  padding:10px;
  background:#222;
}

.color {
  width:25px;
  height:25px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid white;
}
</style>
</head>

<body>

<h2>💬 Chat + 🎨 Canvas Multiplayer</h2>

<div id="chat"></div>

<input id="name" placeholder="nama kamu">
<input id="msg" placeholder="chat...">
<button onclick="send()">Kirim</button>

<!-- TOOLBAR DRAW -->
<div class="toolbar">
  <div class="color" style="background:black" onclick="setColor('black')"></div>
  <div class="color" style="background:red" onclick="setColor('red')"></div>
  <div class="color" style="background:blue" onclick="setColor('blue')"></div>
  <div class="color" style="background:green" onclick="setColor('green')"></div>
  <div class="color" style="background:purple" onclick="setColor('purple')"></div>
  <button onclick="setErase()">🧽 Eraser</button>
</div>

<canvas id="canvas" width="350" height="350"></canvas>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://lxbeqkncyqfqajphoago.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4YmVxa25jeXFmcWFqcGhvYWdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0OTcyODcsImV4cCI6MjA5NjA3MzI4N30.2oqWj2qMzIrOf4fh3oJmNeK4bGpeHH1GRGKDd1jMI6U"
);

/* ================= CHAT ================= */
const chatBox = document.getElementById("chat");

async function loadChat() {
  let { data } = await supabase
    .from("messages")
    .select("*")
    .order("id", { ascending: true });

  data.forEach(addMessage);
}
loadChat();

supabase
  .channel("chat")
  .on("postgres_changes",
  { event: "INSERT", schema: "public", table: "messages" },
  (payload) => addMessage(payload.new))
  .subscribe();

function addMessage(m) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = `${m.name}: ${m.text}`;
  chatBox.appendChild(div);
}

/* ================= DRAW CANVAS ================= */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let color = "black";
let size = 3;

/* start draw */
canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mouseleave", () => drawing = false);

canvas.addEventListener("mousemove", async (e) => {
  if (!drawing) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  draw(x, y, color, size);

  await supabase.from("drawings").insert([{
    x, y, color, size, type: "draw"
  }]);
});

function draw(x, y, c, s) {
  ctx.fillStyle = c;
  ctx.beginPath();
  ctx.arc(x, y, s, 0, Math.PI * 2);
  ctx.fill();
}

/* realtime drawing */
supabase
  .channel("draw")
  .on("postgres_changes",
  { event: "INSERT", schema: "public", table: "drawings" },
  (payload) => {
    const d = payload.new;

    if (d.type === "draw") {
      draw(d.x, d.y, d.color, d.size);
    } else if (d.type === "erase") {
      draw(d.x, d.y, "white", d.size * 2);
    }
  })
  .subscribe();

/* tools */
window.setColor = (c) => {
  color = c;
  size = 3;
};

window.setErase = () => {
  color = "white";
  size = 10;
};

/* ================= CHAT SEND ================= */
window.send = async function () {
  const name = document.getElementById("name").value || "anon";
  const text = document.getElementById("msg").value;

  if (!text) return;

  await supabase.from("messages").insert([
    { name, text }
  ]);

  document.getElementById("msg").value = "";
};
</script>

</body>
</html>
